<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">


    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">


    <title>WaterCheck</title>


    <!-- PWA設定 -->

    <link rel="manifest" href="manifest.json">


    <meta name="theme-color"
          content="#121212">


    <!-- CSS -->

    <link rel="stylesheet" href="style.css">


</head>


<body>


<div id="app">


    <!-- ================================
         ヘッダー
    ================================= -->

    <header id="header">


        <h1 id="appTitle">
            WaterCheck
        </h1>


        <p id="appSubTitle">
            Ver.1.0.0
        </p>


    </header>





    <!-- ================================
         進捗表示
    ================================= -->

    <section id="progressArea">


        <div id="progressText">


            <span id="completedCount">
                0
            </span>

            /

            <span id="totalCount">
                0
            </span>

            完了


        </div>




        <div id="progressBarArea">


            <div id="progressBar">


                <div id="progressValue">

                </div>


            </div>


        </div>




        <div id="remainingArea">


            残り：

            <span id="remainingCount">
                0
            </span>

            件


        </div>




        <div id="remainingNumbers">


        </div>



    </section>







    <!-- ================================
         メイン一覧
    ================================= -->

    <main id="mainArea">



        <table id="checkTable">


            <thead>


                <tr>


                    <th class="colNo">
                        No
                    </th>


                    <th class="colPlace">
                        場所
                    </th>


                    <th class="colStatus">
                        状態
                    </th>


                    <th class="colPhoto">
                        写真
                    </th>


                    <th class="colCheckTime">
                        チェック時刻
                    </th>


                    <th class="colPhotoTime">
                        写真時刻
                    </th>


                    <th class="colMemo">
                        メモ
                    </th>


                </tr>


            </thead>



            <tbody id="checkTableBody">


            </tbody>



        </table>



    </main>







    <!-- ================================
         操作ボタン
    ================================= -->

    <footer id="footer">


        <button id="saveButton">

            保存

        </button>



        <button id="resetButton">

            リセット

        </button>



    </footer>




</div>





<!-- ================================
     JavaScript読み込み

     順番重要

     data.js
        ↓
     app.js

================================= -->


<script src="data.js"></script>


<script src="app.js"></script>


<!--
====================================================

写真撮影用エリア

Androidカメラ呼び出し

====================================================
-->


<input
    type="file"
    id="cameraInput"
    accept="image/*"
    capture="environment"
    style="display:none;"
>



<!--
====================================================
写真表示ダイアログ

Ver1.0.03

・写真拡大表示
・写真撮り直し
・写真削除

====================================================
-->

<div
    id="photoDialog"
    class="photo-dialog"
    style="display:none;"
>

    <div
        class="photo-dialog-content"
    >

        <!-- 閉じる -->

        <button
            id="closePhotoDialog"
        >

            ×

        </button>


        <!-- 写真 -->

        <div
            id="photoPreviewArea"
        >
        </div>


        <!-- 下部ボタン -->

        <div
            class="photo-dialog-footer"
        >

            <button
                id="deletePhotoButton"
            >

                🗑 削除

            </button>


            <button
                id="retakePhotoButton"
            >

                📷 撮り直す

            </button>


        </div>


    </div>

</div>
</body>


</html>
